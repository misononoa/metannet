# metannet 設定ファイル

[audio]
# input_device = 0   # 入力デバイス番号
# output_device = 0  # 出力デバイス番号

[vad]
threshold = 0.5
min_speech_ms = 250
min_silence_ms = 600
speech_pad_ms = 200
max_speech_ms = 15000

[whisper]
model = "small"
language = "ja"
# device = "cuda"

[voicevox]
url = "http://127.0.0.1:50021"
speaker = 2
speed_scale = 1.0
pitch_scale = 0.0
timeout = 30.0

[app]
transcribe_only = false
